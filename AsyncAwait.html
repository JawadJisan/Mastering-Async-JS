      // Error Handling with try/catch
      async function getUser() {
        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/todos/1",
          );
        //   console.log(response);
          const data = await response.json();
          console.log(data);
        } catch (error) {
          console.log("Errors:", error);
        }
      }
      getUser();
    </script>

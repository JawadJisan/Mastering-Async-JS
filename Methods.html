      async function deleteUser(id) {
        try {
          const response = await fetch(
            `https://jsonplaceholder.typicode.com/posts/${id}`,
            {
              method: "DELETE",
              headers: { "Content-Type": "application/json" },
            },
          );
          console.log(response);
